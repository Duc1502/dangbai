<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Bài Tự Động</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        select,
        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        select:focus,
        input:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }

        .radio-group label {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: normal;
        }

        .radio-group input[type="radio"] {
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin-top: 15px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f0f0f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-text {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease-out;
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-header h2 {
            margin: 0;
            color: #333;
        }

        .close-modal {
            float: right;
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
            line-height: 20px;
        }

        .close-modal:hover {
            color: #000;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-body input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-footer button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #333;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
        }

        .btn-suggest {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-suggest:hover {
            opacity: 0.9;
        }

        .btn-suggest:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .suggestions-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .suggestion-item {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            font-size: 14px;
        }

        .suggestion-item:hover {
            background: #f0f0f0;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .suggestion-item.selected {
            background: #e8f0ff;
            border-color: #667eea;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Đăng Bài Tự Động</h1>
        <p class="subtitle">Đăng bài lên website của bạn chỉ trong vài click</p>

        <form id="form" onsubmit="handleSubmit(event)">
            <!-- Website Selection -->
            <div class="form-group">
                <label for="website">Chọn Website *</label>
                <select id="website" name="website" required>
                    <option value="">-- Chọn website --</option>
                    <option value="1">1. Tech Update Daily</option>
                    <option value="2">2. Discovering AI World</option>
                </select>
            </div>

            <!-- Title -->
            <div class="form-group">
                <label for="title">Tiêu Đề Bài Viết *</label>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <input
                        type="text"
                        id="title"
                        name="title"
                        placeholder="Nhập tiêu đề bài viết"
                        required
                        maxlength="200"
                    />
                    <button type="button" id="suggestBtn" title="Gợi ý tiêu đề" style="
                        padding: 12px 16px;
                        border: 1px solid #ddd;
                        border-radius: 5px;
                        background: white;
                        cursor: pointer;
                        font-size: 18px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        transition: all 0.3s;
                    " onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='white'">
                        ✨
                    </button>
                </div>
                <p class="info-text">Tiêu đề không quá 200 ký tự</p>
            </div>

            <!-- Category -->
            <div class="form-group" id="categoryGroup" style="display: none;">
                <label>Category (chọn một hoặc nhiều) *</label>
                <div id="categoryOptions" style="display: flex; flex-direction: column; gap: 10px; margin-top: 8px;">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>

            <!-- Image Upload (Optional) -->
            <div class="form-group">
                <label for="image">Ảnh Featured (Tùy chọn)</label>
                <input
                    type="file"
                    id="image"
                    name="image"
                    accept="image/*"
                />
                <p class="info-text">Nếu không tải lên, ảnh sẽ được tạo tự động. Hỗ trợ JPG, PNG, WebP</p>
            </div>

            <!-- Publish Option -->
            <div class="form-group">
                <label>Đăng Bài</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="publish" value="draft" checked />
                        Lưu Nháp
                    </label>
                    <label>
                        <input type="radio" name="publish" value="publish" />
                        Đăng Ngay
                    </label>
                </div>
                <p class="info-text">Lưu nháp để sửa sau, đăng ngay để công khai</p>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="reset" class="btn-reset">Xóa</button>
                <button type="submit" class="btn-submit" id="submitBtn">Đăng Bài</button>
            </div>

            <!-- Loading -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Đang xử lý...</p>
            </div>

            <!-- Message -->
            <div class="message" id="message"></div>
        </form>
    </div>

    <!-- Title Suggestion Modal -->
    <div id="suggestModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close-modal" onclick="closeSuggestModal()">&times;</span>
                <h2>Gợi ý Tiêu Đề</h2>
            </div>
            <div class="modal-body">
                <label for="keywordInput" style="display: block; margin-bottom: 8px; font-weight: 600;">Nhập từ khóa chính:</label>
                <input
                    type="text"
                    id="keywordInput"
                    placeholder="vd: AI, ChatGPT, Security..."
                    onkeypress="if(event.key==='Enter') suggestTitles()"
                />
                <div id="suggestionsContainer" class="suggestions-list"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeSuggestModal()">Đóng</button>
                <button class="btn-suggest" id="suggestBtnModal" onclick="suggestTitles()">Gợi ý Tiêu Đề</button>
            </div>
        </div>
    </div>

    <script>
        // Title suggestion functions
        document.getElementById('suggestBtn').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('suggestModal').style.display = 'block';
            document.getElementById('keywordInput').focus();
        });

        function closeSuggestModal() {
            document.getElementById('suggestModal').style.display = 'none';
            document.getElementById('suggestionsContainer').innerHTML = '';
            document.getElementById('keywordInput').value = '';
        }

        // Close modal when clicking outside
        window.addEventListener('click', function(e) {
            const modal = document.getElementById('suggestModal');
            if (e.target === modal) {
                closeSuggestModal();
            }
        });

        async function suggestTitles() {
            const keyword = document.getElementById('keywordInput').value.trim();
            const suggestBtn = document.getElementById('suggestBtnModal');
            const suggestContainer = document.getElementById('suggestionsContainer');

            if (!keyword) {
                alert('Vui lòng nhập từ khóa');
                return;
            }

            // Show loading
            suggestBtn.disabled = true;
            suggestBtn.textContent = 'Đang gợi ý...';
            suggestContainer.innerHTML = '<div style="text-align: center; padding: 20px;">⏳ Đang xử lý...</div>';

            try {
                const response = await fetch('/api/suggest-titles', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ keyword: keyword }),
                });

                const result = await response.json();

                if (result.success && result.titles) {
                    suggestContainer.innerHTML = '';
                    result.titles.forEach((title, index) => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.textContent = title;
                        div.onclick = function() {
                            document.getElementById('title').value = title;
                            closeSuggestModal();
                        };
                        suggestContainer.appendChild(div);
                    });
                } else {
                    suggestContainer.innerHTML = '<div style="color: #d32f2f; text-align: center; padding: 20px;">❌ ' + (result.error || 'Lỗi khi gợi ý tiêu đề') + '</div>';
                }
            } catch (error) {
                suggestContainer.innerHTML = '<div style="color: #d32f2f; text-align: center; padding: 20px;">❌ Lỗi: ' + error.message + '</div>';
            } finally {
                suggestBtn.disabled = false;
                suggestBtn.textContent = 'Gợi ý Tiêu Đề';
            }
        }

        // Category mapping
        const categories = {
            '1': [
                'Artificial Intelligence',
                'Business',
                'ChatGPT',
                'Cyberghost',
                'Heygen',
                'PIA',
                'Quotex',
                'review',
                'Security',
                'Surfshark',
                'Technew',
                'Technology',
                'VPN'
            ],
            '2': [
                'Artificial Intelligence',
                'Blockchain',
                'ChatGPT',
                'Cyberghost',
                'Heygen',
                'PIA',
                'IoT',
                'Metaverse',
                'Surfshark',
                'Technew',
                'VPN'
            ]
        };

        // Handle website selection
        document.getElementById('website').addEventListener('change', function() {
            const website = this.value;
            const categoryGroup = document.getElementById('categoryGroup');
            const categoryOptions = document.getElementById('categoryOptions');

            if (website && categories[website]) {
                // Show category group
                categoryGroup.style.display = 'block';

                // Clear previous options
                categoryOptions.innerHTML = '';

                // Add checkboxes for each category
                categories[website].forEach(cat => {
                    const label = document.createElement('label');
                    label.style.display = 'flex';
                    label.style.alignItems = 'center';
                    label.style.gap = '8px';
                    label.style.cursor = 'pointer';
                    label.style.fontWeight = 'normal';
                    label.style.margin = '0';

                    const input = document.createElement('input');
                    input.type = 'checkbox';
                    input.name = 'categories';
                    input.value = cat;
                    input.style.width = 'auto';
                    input.style.cursor = 'pointer';
                    input.style.margin = '0';

                    label.appendChild(input);
                    label.appendChild(document.createTextNode(cat));
                    categoryOptions.appendChild(label);
                });
            } else {
                categoryGroup.style.display = 'none';
            }
        });

        async function handleSubmit(e) {
            e.preventDefault();

            const form = document.getElementById('form');
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const message = document.getElementById('message');

            // Validate
            const website = document.getElementById('website').value;
            const title = document.getElementById('title').value.trim();

            // Get selected categories
            const selectedCats = Array.from(document.querySelectorAll('input[name="categories"]:checked'))
                .map(cb => cb.value);

            if (!website || !title) {
                showMessage('Vui lòng điền đầy đủ thông tin', 'error');
                return;
            }

            if (selectedCats.length === 0) {
                showMessage('Vui lòng chọn ít nhất một category', 'error');
                return;
            }

            // Prepare FormData for file upload support
            const formData = new FormData();
            formData.append('website', website);
            formData.append('title', title);
            formData.append('category', selectedCats.join(', '));
            formData.append('publish', document.querySelector('input[name="publish"]:checked').value);

            // Add image file if selected
            const imageFile = document.getElementById('image').files[0];
            if (imageFile) {
                formData.append('image', imageFile);
            }

            // Show loading
            submitBtn.disabled = true;
            loading.style.display = 'block';
            message.style.display = 'none';

            try {
                const response = await fetch('/api/post-article', {
                    method: 'POST',
                    body: formData,
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('OK - ' + result.message, 'success');
                    form.reset();
                    document.getElementById('categoryGroup').style.display = 'none';
                } else {
                    showMessage('ERROR - ' + (result.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                showMessage('ERROR - ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type}`;
            message.style.display = 'block';
        }
    </script>
</body>
</html>
